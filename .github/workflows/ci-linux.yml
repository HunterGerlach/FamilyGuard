name: Build and Test (Linux/Podman)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build, test, and cross-compile in UBI9 container
        run: podman build -f build/Containerfile -t familyguard-build .

      - name: Extract Windows binaries
        run: |
          podman create --name extract familyguard-build
          podman cp extract:/publish ./publish
          podman rm extract

      - name: Upload Service binary
        uses: actions/upload-artifact@v4
        with:
          name: familyguard-service-win-x64
          path: publish/service/

      - name: Upload Agent binary
        uses: actions/upload-artifact@v4
        with:
          name: familyguard-agent-win-x64
          path: publish/agent/

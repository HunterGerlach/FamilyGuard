name: Build and Test (Windows)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-test:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Restore
        run: dotnet restore FamilyGuard.sln

      - name: Build
        run: dotnet build FamilyGuard.sln -c Release --no-restore

      - name: Test (cross-platform)
        run: |
          dotnet test tests/FamilyGuard.Domain.Tests/ -c Release --no-build --logger "trx;LogFileName=domain.trx"
          dotnet test tests/FamilyGuard.Application.Tests/ -c Release --no-build --logger "trx;LogFileName=application.trx"
          dotnet test tests/FamilyGuard.Infrastructure.Tests/ -c Release --no-build --logger "trx;LogFileName=infrastructure.trx"

      - name: Test (Windows integration)
        run: dotnet test tests/FamilyGuard.Integration.Tests/ -c Release --no-build --logger "trx;LogFileName=integration.trx"
        continue-on-error: true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: '**/TestResults/*.trx'

name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Restore
        run: dotnet restore FamilyGuard.sln

      - name: Test
        run: |
          dotnet test tests/FamilyGuard.Domain.Tests/ -c Release
          dotnet test tests/FamilyGuard.Application.Tests/ -c Release
          dotnet test tests/FamilyGuard.Infrastructure.Tests/ -c Release

      # --- Self-contained publish to single flat directory ---
      # Publish all three to the same output dir — shared runtime DLLs are deduplicated
      - name: Publish all components (self-contained, flat directory)
        run: |
          dotnet publish src/FamilyGuard.Service/FamilyGuard.Service.csproj -c Release -r win-x64 --self-contained true -o publish/app
          dotnet publish src/FamilyGuard.Agent/FamilyGuard.Agent.csproj -c Release -r win-x64 --self-contained true -o publish/app
          dotnet publish src/FamilyGuard.UI/FamilyGuard.UI.csproj -c Release -r win-x64 --self-contained true -o publish/app

      - name: Clean PDB files and report
        shell: pwsh
        run: |
          Get-ChildItem publish/app -Filter "*.pdb" | Remove-Item -Force
          $count = (Get-ChildItem publish/app -File).Count
          Write-Host "Total files in flat publish: $count"

      # --- Code Signing ---
      - name: Decode signing certificate
        shell: pwsh
        env:
          CODE_SIGNING_CERT: ${{ secrets.CODE_SIGNING_CERT }}
        run: |
          $certBytes = [Convert]::FromBase64String($env:CODE_SIGNING_CERT)
          [IO.File]::WriteAllBytes("${{ runner.temp }}\codesign.pfx", $certBytes)

      - name: Sign executables
        shell: pwsh
        env:
          CODE_SIGNING_PASSWORD: ${{ secrets.CODE_SIGNING_PASSWORD }}
        run: |
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -like "*x64*" } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) {
            Write-Warning "signtool.exe not found — skipping signing"
            exit 0
          }

          $filesToSign = @(
            "publish/app/FamilyGuard.Service.exe",
            "publish/app/FamilyGuard.Agent.exe",
            "publish/app/FamilyGuard.UI.exe"
          )

          foreach ($file in $filesToSign) {
            if (Test-Path $file) {
              & $signtool sign /f "${{ runner.temp }}\codesign.pfx" /p $env:CODE_SIGNING_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $file
            }
          }

      # --- Installer ---
      - name: Install WiX Toolset
        run: dotnet tool install --global wix --version 5.0.2

      - name: Generate installer files and build MSI
        shell: pwsh
        run: |
          # Generate WiX fragment listing ALL files from the flat publish directory
          # (excluding Service.exe which is in the ServiceRegistration component)
          $allFiles = Get-ChildItem publish/app -File | Where-Object { $_.Name -ne 'FamilyGuard.Service.exe' }

          $wxs = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">
            <Fragment>
              <ComponentGroup Id="AllFiles" Directory="INSTALLFOLDER">
          "@
          foreach ($f in $allFiles) {
            $id = "f_" + ($f.Name -replace '[^a-zA-Z0-9]', '_')
            $wxs += "      <Component Id=`"$id`" Guid=`"*`"><File Source=`"`$(var.PublishDir)\$($f.Name)`" /></Component>`n"
          }
          $wxs += @"
              </ComponentGroup>
            </Fragment>
          </Wix>
          "@

          $wxs | Out-File -FilePath installer/HarvestedFiles.wxs -Encoding utf8
          Write-Host "Generated HarvestedFiles.wxs with $($allFiles.Count) files"

          $productVersion = "${{ github.ref_name }}".TrimStart('v')
          wix build installer/Package.wxs installer/HarvestedFiles.wxs `
            -d PublishDir=publish/app `
            -d "ProductVersion=$productVersion" `
            -o publish/FamilyGuard.msi

          if (Test-Path publish/FamilyGuard.msi) {
            $version = "${{ github.ref_name }}".TrimStart('v')
            $short = "${{ github.sha }}".Substring(0, 7)
            $versionedName = "FamilyGuard-$version-$short.msi"
            Move-Item publish/FamilyGuard.msi "publish/$versionedName"
            $size = (Get-Item "publish/$versionedName").Length / 1MB
            Write-Host "MSI built successfully: $versionedName ($([math]::Round($size, 1)) MB)"
          }
        continue-on-error: true

      - name: Sign MSI
        shell: pwsh
        env:
          CODE_SIGNING_PASSWORD: ${{ secrets.CODE_SIGNING_PASSWORD }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $short = "${{ github.sha }}".Substring(0, 7)
          $msiPath = "publish/FamilyGuard-$version-$short.msi"
          if (-not (Test-Path $msiPath)) { Write-Host "No MSI to sign"; exit 0 }

          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -like "*x64*" } |
            Select-Object -First 1 -ExpandProperty FullName

          if ($signtool) {
            & $signtool sign /f "${{ runner.temp }}\codesign.pfx" /p $env:CODE_SIGNING_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $msiPath
          }

      # --- Cleanup cert ---
      - name: Remove signing certificate
        if: always()
        shell: pwsh
        run: |
          $certPath = "${{ runner.temp }}\codesign.pfx"
          if (Test-Path $certPath) { Remove-Item $certPath -Force }

      # --- Release ---
      - name: Generate update manifest
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $short = "${{ github.sha }}".Substring(0, 7)
          $msiName = "FamilyGuard-$version-$short.msi"
          $msiPath = "publish/$msiName"
          $hash = if (Test-Path $msiPath) { (Get-FileHash $msiPath -Algorithm SHA256).Hash } else { "N/A" }
          $manifest = @{
            version = $version
            sha256 = $hash
            download_url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$msiName"
            released_at = (Get-Date -Format "o")
          } | ConvertTo-Json
          $manifest | Out-File -FilePath publish/update-manifest.json -Encoding utf8
          Write-Host $manifest

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: familyguard-${{ github.ref_name }}
          path: |
            publish/FamilyGuard-*.msi
            publish/update-manifest.json
            publish/app/

      - name: Clean stale release assets
        continue-on-error: true
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Remove existing assets if the release already exists (re-tag scenario)
          $releaseExists = gh release view "${{ github.ref_name }}" 2>&1
          if ($LASTEXITCODE -ne 0) {
            Write-Host "No existing release for ${{ github.ref_name }} — nothing to clean"
            exit 0
          }
          $assets = gh release view "${{ github.ref_name }}" --json assets --jq '.assets[].name' 2>$null
          if ($assets) {
            foreach ($asset in $assets -split "`n") {
              if ($asset.Trim()) {
                Write-Host "Removing stale asset: $asset"
                gh release delete-asset "${{ github.ref_name }}" $asset.Trim() --yes 2>$null
              }
            }
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            publish/FamilyGuard-*.msi
            publish/update-manifest.json

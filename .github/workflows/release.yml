name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Restore
        run: dotnet restore FamilyGuard.sln

      - name: Test
        run: |
          dotnet test tests/FamilyGuard.Domain.Tests/ -c Release
          dotnet test tests/FamilyGuard.Application.Tests/ -c Release
          dotnet test tests/FamilyGuard.Infrastructure.Tests/ -c Release

      # --- Self-contained publish (no .NET runtime dependency) ---
      - name: Publish Service (self-contained)
        run: dotnet publish src/FamilyGuard.Service/FamilyGuard.Service.csproj -c Release -r win-x64 --self-contained true -o publish/service

      - name: Publish Agent (self-contained)
        run: dotnet publish src/FamilyGuard.Agent/FamilyGuard.Agent.csproj -c Release -r win-x64 --self-contained true -o publish/agent

      - name: Publish UI (self-contained)
        run: dotnet publish src/FamilyGuard.UI/FamilyGuard.UI.csproj -c Release -r win-x64 --self-contained true -o publish/ui

      # Remove PDB files to reduce MSI size
      - name: Clean PDB files
        shell: pwsh
        run: |
          Get-ChildItem publish -Recurse -Filter "*.pdb" | Remove-Item -Force
          $serviceCount = (Get-ChildItem publish/service -File).Count
          $agentCount = (Get-ChildItem publish/agent -File).Count
          $uiCount = (Get-ChildItem publish/ui -File).Count
          Write-Host "Service: $serviceCount files, Agent: $agentCount files, UI: $uiCount files"

      # --- Code Signing ---
      - name: Decode signing certificate
        shell: pwsh
        env:
          CODE_SIGNING_CERT: ${{ secrets.CODE_SIGNING_CERT }}
        run: |
          $certBytes = [Convert]::FromBase64String($env:CODE_SIGNING_CERT)
          [IO.File]::WriteAllBytes("${{ runner.temp }}\codesign.pfx", $certBytes)

      - name: Sign executables
        shell: pwsh
        env:
          CODE_SIGNING_PASSWORD: ${{ secrets.CODE_SIGNING_PASSWORD }}
        run: |
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -like "*x64*" } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) {
            Write-Warning "signtool.exe not found — skipping signing"
            exit 0
          }

          $filesToSign = @(
            "publish/service/FamilyGuard.Service.exe",
            "publish/agent/FamilyGuard.Agent.exe",
            "publish/ui/FamilyGuard.UI.exe"
          )

          foreach ($file in $filesToSign) {
            if (Test-Path $file) {
              & $signtool sign /f "${{ runner.temp }}\codesign.pfx" /p $env:CODE_SIGNING_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $file
            }
          }

      # --- Installer ---
      - name: Install WiX Toolset
        run: dotnet tool install --global wix --version 5.0.2

      - name: Generate installer files and build MSI
        shell: pwsh
        run: |
          # Generate a single WiX source file listing ALL files from all publish directories
          # This replaces the manual file listing approach and ensures every dependency is included

          $serviceFiles = Get-ChildItem publish/service -File | Where-Object { $_.Name -ne 'FamilyGuard.Service.exe' }
          $agentFiles = Get-ChildItem publish/agent -File
          $uiFiles = Get-ChildItem publish/ui -File

          $wxs = @"
          <?xml version="1.0" encoding="UTF-8"?>
          <Wix xmlns="http://wixtoolset.org/schemas/v4/wxs">
            <Fragment>
              <ComponentGroup Id="ServiceFiles" Directory="SERVICEDIR">
          "@
          foreach ($f in $serviceFiles) {
            $id = "svc_" + ($f.Name -replace '[^a-zA-Z0-9]', '_')
            $wxs += "      <Component Id=`"$id`" Guid=`"*`"><File Source=`"`$(var.ServicePublishDir)\$($f.Name)`" /></Component>`n"
          }
          $wxs += @"
              </ComponentGroup>
              <ComponentGroup Id="AgentFiles" Directory="AGENTDIR">
          "@
          foreach ($f in $agentFiles) {
            $id = "agt_" + ($f.Name -replace '[^a-zA-Z0-9]', '_')
            $wxs += "      <Component Id=`"$id`" Guid=`"*`"><File Source=`"`$(var.AgentPublishDir)\$($f.Name)`" /></Component>`n"
          }
          $wxs += @"
              </ComponentGroup>
              <ComponentGroup Id="UIFiles" Directory="UIDIR">
          "@
          foreach ($f in $uiFiles) {
            $id = "ui_" + ($f.Name -replace '[^a-zA-Z0-9]', '_')
            $wxs += "      <Component Id=`"$id`" Guid=`"*`"><File Source=`"`$(var.UIPublishDir)\$($f.Name)`" /></Component>`n"
          }
          $wxs += @"
              </ComponentGroup>
            </Fragment>
          </Wix>
          "@

          $wxs | Out-File -FilePath installer/HarvestedFiles.wxs -Encoding utf8
          Write-Host "Generated HarvestedFiles.wxs with $($serviceFiles.Count) service + $($agentFiles.Count) agent + $($uiFiles.Count) UI files"

          wix build installer/Package.wxs installer/HarvestedFiles.wxs `
            -d ServicePublishDir=publish/service `
            -d AgentPublishDir=publish/agent `
            -d UIPublishDir=publish/ui `
            -o publish/FamilyGuard.msi

          if (Test-Path publish/FamilyGuard.msi) {
            $version = "${{ github.ref_name }}".TrimStart('v')
            $short = "${{ github.sha }}".Substring(0, 7)
            $versionedName = "FamilyGuard-$version-$short.msi"
            Move-Item publish/FamilyGuard.msi "publish/$versionedName"
            $size = (Get-Item "publish/$versionedName").Length / 1MB
            Write-Host "MSI built successfully: $versionedName ($([math]::Round($size, 1)) MB)"
          }
        continue-on-error: true

      - name: Sign MSI
        shell: pwsh
        env:
          CODE_SIGNING_PASSWORD: ${{ secrets.CODE_SIGNING_PASSWORD }}
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $short = "${{ github.sha }}".Substring(0, 7)
          $msiPath = "publish/FamilyGuard-$version-$short.msi"
          if (-not (Test-Path $msiPath)) { Write-Host "No MSI to sign"; exit 0 }

          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -like "*x64*" } |
            Select-Object -First 1 -ExpandProperty FullName

          if ($signtool) {
            & $signtool sign /f "${{ runner.temp }}\codesign.pfx" /p $env:CODE_SIGNING_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $msiPath
          }

      # --- Cleanup cert ---
      - name: Remove signing certificate
        if: always()
        shell: pwsh
        run: |
          $certPath = "${{ runner.temp }}\codesign.pfx"
          if (Test-Path $certPath) { Remove-Item $certPath -Force }

      # --- Release ---
      - name: Generate update manifest
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $short = "${{ github.sha }}".Substring(0, 7)
          $msiName = "FamilyGuard-$version-$short.msi"
          $msiPath = "publish/$msiName"
          $hash = if (Test-Path $msiPath) { (Get-FileHash $msiPath -Algorithm SHA256).Hash } else { "N/A" }
          $manifest = @{
            version = $version
            sha256 = $hash
            download_url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$msiName"
            released_at = (Get-Date -Format "o")
          } | ConvertTo-Json
          $manifest | Out-File -FilePath publish/update-manifest.json -Encoding utf8
          Write-Host $manifest

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: familyguard-${{ github.ref_name }}
          path: |
            publish/FamilyGuard-*.msi
            publish/update-manifest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            publish/FamilyGuard-*.msi
            publish/update-manifest.json

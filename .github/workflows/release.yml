name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'ga'

      - name: Restore
        run: dotnet restore FamilyGuard.sln

      - name: Test
        run: |
          dotnet test tests/FamilyGuard.Domain.Tests/ -c Release
          dotnet test tests/FamilyGuard.Application.Tests/ -c Release
          dotnet test tests/FamilyGuard.Infrastructure.Tests/ -c Release

      - name: Publish Service
        run: dotnet publish src/FamilyGuard.Service/FamilyGuard.Service.csproj -c Release -r win-x64 -o publish/service --self-contained false

      - name: Publish Agent
        run: dotnet publish src/FamilyGuard.Agent/FamilyGuard.Agent.csproj -c Release -r win-x64 -o publish/agent --self-contained false

      - name: Publish UI
        run: dotnet publish src/FamilyGuard.UI/FamilyGuard.UI.csproj -c Release -r win-x64 -o publish/ui --self-contained false

      # --- Code Signing ---
      - name: Decode signing certificate
        shell: pwsh
        env:
          CODE_SIGNING_CERT: ${{ secrets.CODE_SIGNING_CERT }}
        run: |
          $certBytes = [Convert]::FromBase64String($env:CODE_SIGNING_CERT)
          [IO.File]::WriteAllBytes("${{ runner.temp }}\codesign.pfx", $certBytes)
          Write-Host "Certificate decoded to ${{ runner.temp }}\codesign.pfx"

      - name: Sign executables
        shell: pwsh
        env:
          CODE_SIGNING_PASSWORD: ${{ secrets.CODE_SIGNING_PASSWORD }}
        run: |
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -like "*x64*" } |
            Select-Object -First 1 -ExpandProperty FullName

          if (-not $signtool) {
            Write-Warning "signtool.exe not found — skipping signing"
            exit 0
          }

          Write-Host "Using signtool: $signtool"

          $filesToSign = @(
            "publish/service/FamilyGuard.Service.exe",
            "publish/agent/FamilyGuard.Agent.exe",
            "publish/ui/FamilyGuard.UI.exe"
          )

          foreach ($file in $filesToSign) {
            if (Test-Path $file) {
              Write-Host "Signing $file..."
              & $signtool sign /f "${{ runner.temp }}\codesign.pfx" /p $env:CODE_SIGNING_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 $file
              if ($LASTEXITCODE -ne 0) {
                Write-Warning "Failed to sign $file (exit code $LASTEXITCODE)"
              } else {
                Write-Host "Signed $file successfully"
              }
            }
          }

      # --- Installer ---
      - name: Install WiX Toolset
        env:
          WIX_ACCEPT_OSMF_EULA: "true"
        run: |
          dotnet tool install --global wix
          wix extension add WixToolset.UI.wixext

      - name: Build MSI
        env:
          WIX_ACCEPT_OSMF_EULA: "true"
        run: |
          wix build installer/Package.wxs `
            -d ServicePublishDir=publish/service `
            -d AgentPublishDir=publish/agent `
            -d UIPublishDir=publish/ui `
            -o publish/FamilyGuard.msi
        continue-on-error: true

      - name: Sign MSI
        if: hashFiles('publish/FamilyGuard.msi') != ''
        shell: pwsh
        env:
          CODE_SIGNING_PASSWORD: ${{ secrets.CODE_SIGNING_PASSWORD }}
        run: |
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -like "*x64*" } |
            Select-Object -First 1 -ExpandProperty FullName

          if ($signtool -and (Test-Path "publish/FamilyGuard.msi")) {
            Write-Host "Signing MSI..."
            & $signtool sign /f "${{ runner.temp }}\codesign.pfx" /p $env:CODE_SIGNING_PASSWORD /fd SHA256 /tr http://timestamp.digicert.com /td SHA256 "publish/FamilyGuard.msi"
          }

      # --- Cleanup cert ---
      - name: Remove signing certificate
        if: always()
        shell: pwsh
        run: |
          $certPath = "${{ runner.temp }}\codesign.pfx"
          if (Test-Path $certPath) { Remove-Item $certPath -Force }

      # --- Release ---
      - name: Generate update manifest
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          $msiPath = "publish/FamilyGuard.msi"
          $hash = if (Test-Path $msiPath) { (Get-FileHash $msiPath -Algorithm SHA256).Hash } else { "N/A" }
          $manifest = @{
            version = $version
            sha256 = $hash
            download_url = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/FamilyGuard.msi"
            released_at = (Get-Date -Format "o")
          } | ConvertTo-Json
          $manifest | Out-File -FilePath publish/update-manifest.json -Encoding utf8
          Write-Host $manifest

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: familyguard-${{ github.ref_name }}
          path: publish/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            publish/FamilyGuard.msi
            publish/update-manifest.json

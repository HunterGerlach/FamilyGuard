name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore FamilyGuard.sln

      - name: Test
        run: dotnet test FamilyGuard.sln -c Release --no-restore

      - name: Publish Service
        run: dotnet publish src/FamilyGuard.Service/FamilyGuard.Service.csproj -c Release -o publish/service --self-contained false

      - name: Publish Agent
        run: dotnet publish src/FamilyGuard.Agent/FamilyGuard.Agent.csproj -c Release -o publish/agent --self-contained false

      - name: Publish UI
        run: dotnet publish src/FamilyGuard.UI/FamilyGuard.UI.csproj -c Release -o publish/ui --self-contained false

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: familyguard-${{ github.ref_name }}
          path: publish/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            publish/**/*
